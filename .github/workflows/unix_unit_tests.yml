  name: Unit tests

  on:
    push:
      branches: ['**']
    pull_request:
      branches: ['**']

  jobs:
    build:

      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          os: [macos-latest]
          python-version: [3.11]

      steps:
        - uses: actions/checkout@v4

        - name: Activate conda environment for macOS
          if: matrix.os == 'macos-latest'
          uses: conda-incubator/setup-miniconda@v3
          with:
            activate-environment: test
            python-version: ${{ matrix.python-version }}
            fetch-depth: 2

        - name: Install Python  dependencies
          shell: bash -el {0}
          run: |
            if [ ${{ matrix.os }} == 'macos-latest' ]; then
              export OLD_DYLD_FALLBACK_LIBRARY_PATH=$DYLD_FALLBACK_LIBRARY_PATH
              export DYLD_FALLBACK_LIBRARY_PATH=$DYLD_FALLBACK_LIBRARY_PATH:${CONDA_PREFIX}/lib
              python -m pip install --upgrade pipe
              # conda install --yes -c conda-forge mpi4py openmpi
              conda install --yes conda-forge::mpi4py conda-forge::openmpi
            # elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            #   python -m pip install --upgrade pip
            #   python -m pip install mpi4py
            fi
        - name: Install HNN-core
          shell: bash -el {0}
          run: |
            which mpiexec
            pip install --verbose '.[opt, parallel, test, gui]'
        # - name: Lint with ruff
        #   shell: bash -el {0}
        #   run: |
        #     ruff check hnn_core
        # - name: Test non-MPI, embarrassingly parallel tests with pytest
        #   shell: bash -el {0}
        #   run: |
        #     python -m pytest ./hnn_core/tests/ -m "not uses_mpi" -n auto --cov=hnn_core --cov-report=xml
        - name: Test MPI-using parallel tests with pytest
          shell: bash -el {0}
          run: |
            which mpiexec
            python -m pytest ./hnn_core/tests/ -m "uses_mpi" --cov=hnn_core --cov-report=xml --cov-append
        # - name:  Upload coverage to Codecov
        #   shell: bash -el {0}
        #   run: |
        #     bash <(curl -s https://codecov.io/bash) -f ./coverage.xml
